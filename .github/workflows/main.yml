name: Sync Subdirectory from Upstream

on:
  workflow_dispatch:
#  schedule:
#    - cron: '0 8 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure upstream branch exists
        run: |
          git fetch origin upstream:upstream 2>/dev/null || git checkout -b upstream

      - name: Clone and sync
        run: |
          git clone --depth=1 https://github.com/yeahhe365/All-Model-Chat.git temp
          
          if [ -d "temp/all-model-chat" ]; then
            HASH=$(git -C temp rev-parse --short HEAD)
            rsync -av --delete-after --exclude='.git' temp/all-model-chat/ ./
            rm -rf temp
            
            git config user.name 'github-actions[bot]'
            git config user.email 'github-actions[bot]@users.noreply.github.com'
            git add .
            git diff --staged --quiet || git commit -m "Sync from upstream @ $HASH"
            git push -u origin upstream
          else
            rm -rf temp
          fi
